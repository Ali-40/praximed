# PraxisMed — local PostgreSQL development database
# Local development only. Do not use in staging or production.
# Start with: docker compose -f docker-compose.postgres.yml up -d

services:
  praxismed_postgres:
    image: postgres:16
    container_name: praxismed_postgres_local
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-praxismed_local}
      POSTGRES_USER: ${POSTGRES_USER:-praxismed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-praxismed_local_password}
    ports:
      # Host 5433 avoids conflicts with any existing local PostgreSQL on 5432
      - "5433:5432"
    volumes:
      - praxismed_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-praxismed} -d ${POSTGRES_DB:-praxismed_local}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  praxismed_postgres_data:
