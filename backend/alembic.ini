# Alembic configuration — PraxisMed
# Run migrations from the backend/ directory: alembic upgrade head

[alembic]
# Path to the migration scripts, relative to this file
script_location = %(here)s/migrations

# Database URL is read from the DATABASE_URL environment variable in env.py.
# Do not set sqlalchemy.url here — it would expose credentials in version control.
# sqlalchemy.url =

# Template for new migration file names
file_template = %%(rev)s_%%(slug)s

# Truncate revision identifiers in file names to this length
truncate_slug_length = 40

# Whether to prepend the current date to new revision filenames
prepend_sys_path = .

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
